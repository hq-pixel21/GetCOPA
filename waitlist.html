<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Join the waitlist — Copa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="logo">COPA</div>
  <a class="header-link" href="#">Open the app</a>
</header>

<main class="page">
  <section class="panel">
    <h1>Join the waitlist</h1>

    <p>
      We bring people in gradually to keep the conversation good.
      When there’s space, we’ll send an invite.
    </p>

    <form class="form">
      <label>Email</label>
      <input type="email" placeholder="name@domain.com" />
      <button class="btn btn-primary" type="submit">
        Request access
      </button>
    </form>

    <small>No spam. No marketing. Just the invite.</small>
  </section>
</main>

</body>
</html>
