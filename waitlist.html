<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <title>Join the waitlist — Copa</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="site-header">
    <div class="container">
      <a class="wordmark" href="index.html" aria-label="Copa homepage">
        <img src="assets/logo.png" alt="Copa Logo" class="logo-img" />
      </a>
      <a class="header-link" href="https://app.copa.com">Open the app</a>
    </div>
  </header>

  <main class="page" aria-label="Waitlist">
    <div class="hero-media" aria-hidden="true"></div>
    <div class="hero-wash" aria-hidden="true"></div>

    <div class="page-inner container">
      <section class="panel" aria-label="Join the waitlist form">
        <h2>Join the waitlist</h2>
        <p>
          We bring people in gradually to keep the conversation good.
          When there’s space, we’ll send an invite.
        </p>

        <form class="form" id="waitlistForm">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@domain.com" autocomplete="email" required />
          <button class="btn btn-primary" type="submit">Request access</button>
        </form>

        <div class="status" id="waitlistStatus" role="status" aria-live="polite">
          You’re on the list. We’ll email when it’s your turn.
        </div>

        <div class="help">No spam. No marketing. Just the invite.</div>

        <div class="inline-link">
          Already have access? <a href="https://app.copa.com">Open the app</a>
        </div>
      </section>
    </div>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const statusEl = document.getElementById('waitlistStatus');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      statusEl.classList.add('show');
      form.querySelector('button').textContent = 'Requested';
      form.querySelector('button').disabled = true;
      form.querySelector('button').style.opacity = '0.5';
      form.querySelector('button').style.cursor = 'not-allowed';
    });
  </script>

</body>
</html>
