<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <title>Join the waitlist — Copa</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="site-header">
    <div class="container">
      <div></div>
      <a class="header-link" href="index.html">Back to home</a>
    </div>
  </header>

  <main class="page" aria-label="Waitlist">
    <div class="hero-media" aria-hidden="true"></div>
    <div class="hero-wash" aria-hidden="true"></div>

    <div class="page-inner container">
      <section class="panel" aria-label="Join the waitlist form">
        <h2>Join the waitlist</h2>
        <p>
          We bring people in gradually to keep the conversation good.
          When there’s space, we’ll send an invite.
        </p>

        <form class="form" id="waitlistForm">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@domain.com" autocomplete="email" required />
          <button class="btn btn-primary" type="submit">Request access</button>
        </form>

        <div class="status" id="waitlistStatus" role="status" aria-live="polite">
          You’re on the list. We’ll email when it’s your turn.
        </div>

        <div class="help">No spam. No marketing. Just the invite.</div>

        <div class="inline-link">
          Already have access? <a href="https://app.copa.com">Open the app</a>
        </div>
      </section>
    </div>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const statusEl = document.getElementById('waitlistStatus');
    
    // PASTE YOUR GOOGLE WEB APP URL HERE
    const ENDPOINT = 'https://script.google.com/macros/s/AKfycby71OMctC0Q2czrAPSf6QBuK3pmGy9wVCdZMt6S3zg1Lc0pqGbeOnAGhS4gsY_wbsy5/exec';

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); 
      const btn = form.querySelector('button');
      btn.textContent = 'Requesting...'; 
      btn.disabled = true;

      const formData = new FormData(form);

      try {
        await fetch(ENDPOINT, {
          method: 'POST',
          body: formData,
          mode: 'no-cors' 
        });

        statusEl.classList.add('show');
        btn.textContent = 'Requested';
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
      } catch (error) {
        btn.textContent = 'Error. Try again.';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
