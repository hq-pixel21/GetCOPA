<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <title>Copa</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="site-header">
    <div class="container">
      <div></div>
      <div id="timer" class="header-link" style="color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: 0.1em;">
        00:00:00:00
      </div>
    </div>
  </header>

  <audio id="fahAudio" src="assets/fah.mp3" preload="auto"></audio>

  <main class="hero" aria-label="Copa homepage">
    <div class="hero-media" aria-hidden="true"></div>
    <div class="hero-wash" aria-hidden="true"></div>

    <section class="hero-content container">
      <img src="assets/logo.png" alt="Copa Logo" class="hero-logo" />

      <p class="kicker">Where football lives.</p>

      <h1>Feels like football again.</h1>

      <p class="sub">
        Matchday Energy. Real Banter. Proper Takes<br>
        No Algorithm. No Rage Bait. No Engagement Farming.<br>
        Just Football &mdash For the Culture
      </p>

      <div class="cta-row" role="group" aria-label="Primary actions">
        <a class="btn btn-primary" href="waitlist.html">Join the waitlist</a>
        
        <button class="btn btn-secondary" onclick="playFah()" style="font-variant-numeric: tabular-nums; letter-spacing: 0.1em; min-width: 180px; background: transparent; cursor: pointer;">
          <span id="hero-timer">00:00:00:00</span>
        </button>
      </div>

      <p class="micro">Built by fans &mdash for fans..</p>
    </section>
  </main>

  <script>
    // Audio Control Function
    function playFah() {
      const audio = document.getElementById("fahAudio");
      audio.currentTime = 0; // Restart if clicked again
      audio.play();
    }

    function updateTimers() {
      const targetDate = new Date("2026-04-18T00:00:00+01:00").getTime();
      const now = new Date().getTime();
      const gap = targetDate - now;

      const headerTimer = document.getElementById("timer");
      const heroTimer = document.getElementById("hero-timer");

      if (gap <= 0) {
        const liveText = "00:00:00:00";
        if (headerTimer) headerTimer.innerText = liveText;
        if (heroTimer) heroTimer.innerText = liveText;
        return;
      }

      const second = 1000;
      const minute = second * 60;
      const hour = minute * 60;
      const day = hour * 24;

      const d = Math.floor(gap / day);
      const h = Math.floor((gap % day) / hour);
      const m = Math.floor((gap % hour) / minute);
      const s = Math.floor((gap % minute) / second);

      const timeString = `${d.toString().padStart(2, '0')}:${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

      if (headerTimer) headerTimer.innerText = timeString;
      if (heroTimer) heroTimer.innerText = timeString;
    }

    setInterval(updateTimers, 1000);
    updateTimers();
  </script>

</body>
</html>
