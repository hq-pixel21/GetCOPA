<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <title>Copa</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="site-header">
    <div class="container">
      <a class="wordmark" href="index.html" aria-label="Copa homepage">COPA</a>
      <a class="header-link" href="https://app.copa.com">Open the app</a>
    </div>
  </header>

  <main class="hero" aria-label="Copa homepage">
    <div class="hero-media" aria-hidden="true"></div>
    <div class="hero-wash" aria-hidden="true"></div>

    <section class="hero-content container">
      <img src="assets/logo.png" alt="Copa Logo" class="hero-logo" />

      <p class="kicker">Where football lives.</p>

      <h1>Talk football properly again.</h1>

      <p class="sub">
        We built Copa for the matchday feeling—small, invite‑only, and community‑led.
        No algorithm. No rage bait. Just a room that cares about the game.
      </p>

      <div class="cta-row" role="group" aria-label="Primary actions">
        <a class="btn btn-primary" href="waitlist.html">Join the waitlist</a>
        <a class="btn btn-secondary" href="https://app.copa.com">Open the app</a>
      </div>

      <p class="micro">Invite‑only, on purpose.</p>
    </section>
  </main>

</body>
</html>
