<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPA | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-cold {
            background: transparent;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.3s ease;
        }
        .input-cold:focus {
            border-color: #ffffff;
            outline: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-cold {
            animation: fadeIn 0.8s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-white selection:text-black">

    <nav class="p-6 flex justify-between items-center animate-cold">
        <div class="text-xs font-bold tracking-[0.3em] text-zinc-500 uppercase">System v1.0 // Beta</div>
        <div class="flex space-x-6 text-xs font-bold tracking-widest uppercase">
            <a href="https://x.com/CopaApp" target="_blank" class="hover:text-zinc-400 transition">X</a>
            <a href="#" class="hover:text-zinc-400 transition">Discord</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="animate-cold" style="animation-delay: 0.2s;">
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4 italic">COPA</h1>
            <p class="text-zinc-500 text-sm md:text-lg tracking-[0.2em] uppercase mb-12">The Pitch is Open.</p>
        </div>

        <div class="w-full max-w-sm animate-cold" style="animation-delay: 0.4s;">
            <form action="#" method="POST" class="flex flex-col space-y-6">
                <input type="email" placeholder="IDENTIFY (EMAIL ADDRESS)" 
                       class="input-cold w-full p-4 text-sm tracking-widest uppercase text-center" required>
                
                <button type="submit" 
                        class="bg-white text-black text-xs font-black tracking-[0.3em] uppercase py-5 px-10 hover:bg-zinc-200 transition-all active:scale-95">
                    Request Access
                </button>
            </form>
            <p class="mt-8 text-[10px] text-zinc-600 tracking-widest uppercase">No noise. No bots. Pure football.</p>
        </div>
    </main>

    <footer class="p-8 border-t border-zinc-900 animate-cold" style="animation-delay: 0.6s;">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-[10px] tracking-[0.2em] text-zinc-500 uppercase font-bold">
            
            <div class="flex flex-col space-y-2">
                <span class="text-zinc-700">Communication</span>
                <a href="mailto:access@getcopa.com" class="text-white hover:underline">access@getcopa.com</a>
            </div>

            <div class="flex flex-col space-y-2 text-center hidden md:flex">
                <span class="text-zinc-700">Terrace Status</span>
                <span class="text-white">Live Connection // Secure</span>
            </div>

            <div class="flex flex-col space-y-2 md:text-right">
                <span class="text-zinc-700">Identity</span>
                <span class="text-white">Member Since 2026</span>
            </div>

        </div>
    </footer>

</body>
</html>
